# Base configuration: ~150M parameter model
# This is the "control" experiment. All ablations change one thing from this.

name: base

model:
  vocab_size: 32000
  d_model: 768
  n_layers: 12
  n_heads: 12
  n_kv_heads: 12        # MHA (same as n_heads)
  max_seq_len: 1024
  dropout: 0.0
  pos_encoding: rope     # Options: rope, alibi, learned
  activation: swiglu     # Options: swiglu, gelu
  norm_type: rmsnorm     # Options: rmsnorm, layernorm
  norm_position: pre     # Options: pre, post
  tie_embeddings: true

data:
  data_dir: ./data/processed
  seq_len: 1024
  batch_size: 32
  num_workers: 4

training:
  max_steps: 50000
  lr: 3.0e-4
  min_lr: 3.0e-5
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 500
  lr_schedule: cosine
  grad_accum_steps: 4
  log_interval: 10
  eval_interval: 500
  save_interval: 5000
  dtype: bfloat16
  compile: true
