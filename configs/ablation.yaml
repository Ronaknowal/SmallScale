# Ablation config: same architecture as base, optimized for faster runs.
# Used for screening experiments — 10K steps is enough to rank configs.

name: ablation

model:
  vocab_size: 32000
  d_model: 768
  n_layers: 12
  n_heads: 12
  n_kv_heads: 12
  max_seq_len: 1024
  dropout: 0.0
  pos_encoding: rope
  activation: swiglu
  norm_type: rmsnorm
  norm_position: pre
  tie_embeddings: true

data:
  data_dir: ./data/processed
  seq_len: 1024
  batch_size: 128
  num_workers: 4

training:
  max_steps: 10000          # enough to rank ablation configs
  lr: 3.0e-4
  min_lr: 3.0e-5
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 500
  lr_schedule: cosine
  grad_accum_steps: 1       # no accum needed with flash attention + H100
  log_interval: 10
  eval_interval: 1000       # less frequent eval
  save_interval: 5000
  dtype: bfloat16
  compile: true
